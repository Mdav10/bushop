{% extends "base.html" %}
{% block title %}Create Admin - BuShop{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3><i class="bi bi-person-plus"></i> Create Admin</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username *</label>
                        <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Full Name *</label>
                        <input type="text" name="full_name" class="form-control" placeholder="Enter full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" placeholder="Enter phone number">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password *</label>
                        <input type="password" name="password" class="form-control" placeholder="Create strong password" required>
                        <small class="text-muted">8+ chars with uppercase, lowercase, number, special character</small>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_super_admin" class="form-check-input" id="is_super_admin">
                        <label class="form-check-label" for="is_super_admin">Super Admin (full system access)</label>
                    </div>
                    <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Create Admin</button>
                    <a href="/admin/admins" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
