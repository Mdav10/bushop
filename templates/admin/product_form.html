{% extends "base.html" %}
{% block title %}{{ 'Edit' if product else 'Create' }} Product - MugiStore{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0"><i class="bi bi-{{ 'pencil' if product else 'plus-circle' }}"></i> {{ 'Edit' if product else 'Create' }} Product</h3>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-12">
                            <div class="mb-3">
                                <label class="form-label">Product Name *</label>
                                <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" placeholder="Enter product name" required>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select name="category_id" class="form-control">
                                    <option value="">Select Category</option>
                                    {% for category in categories %}
                                    <option value="{{ category.id }}" {% if product and product.category_id == category.id %}selected{% endif %}>
                                        {{ category.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea name="description" class="form-control" rows="4" placeholder="Describe your product">{{ product.description if product else '' }}</textarea>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="mb-3">
                                <label class="form-label">Price (FBu) *</label>
                                <input type="number" name="price" class="form-control" step="0.01" value="{{ product.price if product else '' }}" placeholder="0" required>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="mb-3">
                                <label class="form-label">Compare Price</label>
                                <input type="number" name="compare_price" class="form-control" step="0.01" value="{{ product.compare_price if product else '' }}" placeholder="Original price">
                                <small class="text-muted">Shows as crossed out</small>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="mb-3">
                                <label class="form-label">Stock</label>
                                <input type="number" name="stock" class="form-control" value="{{ product.stock if product else 0 }}" placeholder="0">
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="mb-3">
                                <label class="form-label">WhatsApp Link</label>
                                <input type="url" name="whatsapp_link" class="form-control" value="{{ product.whatsapp_link if product else '' }}" placeholder="https://wa.me/257XXXXXXXXX">
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="mb-3">
                                <label class="form-label">Product Image</label>
                                <input type="file" name="image" class="form-control" accept="image/*">
                                {% if product and product.image %}
                                <div class="mt-2">
                                    <img src="{{ product.image }}" style="max-width: 150px; border-radius: 8px;">
                                    <small class="d-block text-muted">Current image</small>
                                </div>
                                {% endif %}
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="mb-3 form-check">
                                <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if not product or product.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="is_active">Active (visible to customers)</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="mb-3 form-check">
                                <input type="checkbox" name="is_featured" class="form-check-input" id="is_featured" {% if product and product.is_featured %}checked{% endif %}>
                                <label class="form-check-label" for="is_featured">⭐ Featured Product</label>
                            </div>
                        </div>
                    </div>
                    <div class="d-grid gap-2 d-sm-flex">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Save Product
                        </button>
                        <a href="/admin/products" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
