{% extends "base.html" %}
{% block title %}Edit Admin - MugiStore{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0"><i class="bi bi-pencil"></i> Edit Admin</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username (Read-only)</label>
                        <input type="text" class="form-control" value="{{ admin.username }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Full Name *</label>
                        <input type="text" name="full_name" class="form-control" value="{{ admin.full_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email (Read-only)</label>
                        <input type="email" class="form-control" value="{{ admin.email }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ admin.phone or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password (leave blank to keep current)</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter new password">
                        <small class="text-muted">8+ chars with uppercase, lowercase, number, special character</small>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_super_admin" class="form-check-input" id="is_super_admin" {% if admin.is_super_admin %}checked{% endif %}>
                        <label class="form-check-label" for="is_super_admin">Super Admin (full system access)</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Update Admin</button>
                        <a href="/admin/admins" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
