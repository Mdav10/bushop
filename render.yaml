services:
  - type: web
    name: mugistore
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn app:app --workers=2 --threads=4 --timeout=120 --max-requests=1000 --max-requests-jitter=100 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mugistore-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: mugistore-db
    databaseName: mugistore
    user: mugistore_user
    plan: free
    postgresMajorVersion: 15
