services:
  - type: web
    name: bushop
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn app:app --workers=2 --threads=4 --timeout=120 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bushop-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: bushop-db
    databaseName: bushop
    user: bushop_user
    plan: free
    postgresMajorVersion: 15
